<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Complaint Portal</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Glass Card */
        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            color: white;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {opacity:0; transform:translateY(20px);}
            to {opacity:1; transform:translateY(0);}
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 26px;
        }

        /* Floating Inputs */
        .field {
            position: relative;
            margin-bottom: 18px;
        }

        .field input,
        .field textarea {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.9);
            font-size: 14px;
        }

        .field label {
            position: absolute;
            left: 12px;
            top: 12px;
            color: #666;
            font-size: 13px;
            transition: 0.3s;
            pointer-events: none;
        }

        .field input:focus + label,
        .field input:not(:placeholder-shown) + label,
        .field textarea:focus + label,
        .field textarea:not(:placeholder-shown) + label {
            top: -8px;
            font-size: 11px;
            background: #fff;
            padding: 2px 6px;
            border-radius: 6px;
        }

        /* Button */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(90deg, #00c853, #00e676);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,200,83,0.4);
        }

        /* Status */
        .status {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .success {
            background: rgba(0,200,83,0.2);
            color: #00ff95;
        }

        .error {
            background: rgba(255,0,0,0.2);
            color: #ff6b6b;
        }



        .admin-link a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            opacity: 0.9;
        }

        .admin-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🏨 Complaint Portal</h1>

    <div class="field">
        <input type="number" id="studentId" placeholder=" " required>
        <label>Student ID</label>
    </div>

    <div class="field">
        <input type="text" id="category" placeholder=" " required>
        <label>Category (e.g. Water, Electricity)</label>
    </div>

    <div class="field">
        <textarea id="description" placeholder=" " required></textarea>
        <label>Description</label>
    </div>

    <button onclick="submitComplaint()">🚀 Submit Complaint</button>

    <div id="statusMessage" class="status"></div>


</div>

<script>
    async function submitComplaint() {

        const statusBox = document.getElementById("statusMessage");

        const complaint = {
            studentId: Number(document.getElementById("studentId").value),
            category: document.getElementById("category").value,
            description: document.getElementById("description").value,
            status: "Pending",
            createdAt: new Date().toISOString()
        };

        try {
            const response = await fetch("http://localhost:8080/api/complaints/add", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(complaint)
            });

            if (response.ok) {
                statusBox.className = "status success";
                statusBox.style.display = "block";
                statusBox.innerText = "✅ Complaint submitted successfully!";

                document.getElementById("studentId").value = "";
                document.getElementById("category").value = "";
                document.getElementById("description").value = "";
            } else {
                throw new Error("Failed");
            }

        } catch (error) {
            statusBox.className = "status error";
            statusBox.style.display = "block";
            statusBox.innerText = "❌ Submission failed. Check backend.";
            console.error(error);
        }
    }
</script>

</body>
</html>
